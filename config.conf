# HostFusion Configuration File
# Edit this file to customize behavior

# Primary hosts source
URL_PRIMARY=https://raw.githubusercontent.com/ImMALWARE/dns.malw.link/master/hosts

# Backup source (optional)
URL_BACKUP=https://cdn.jsdelivr.net/gh/ImMALWARE/dns.malw.link@master/hosts

# Auto-update settings
AUTO_UPDATE=true
UPDATE_INTERVAL=86400  # 24 hours in seconds

# Logging
ENABLE_LOG=true
LOG_LEVEL=INFO  # DEBUG, INFO, WARN, ERROR

# Backup settings
ENABLE_BACKUP=true
MAX_BACKUPS=5

# Verification
VERIFY_SHA=false  # Set to true if you want to verify SHA256

# Custom hosts merging
MERGE_CUSTOM=true  # Keep existing custom entries in /system/etc/hosts
CUSTOM_HOSTS_FILE=/data/adb/modules/hostfusion/custom_hosts.txt

# DNS flush command (default works for most Android devices)
DNS_FLUSH_CMD="ndc resolver flushdefaultif; ndc resolver flushnet 0"